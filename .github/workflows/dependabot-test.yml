name: CI Test

on:
    pull_request:
        types: [opened, synchronize, reopened]
    push:
        branches:
        - main
        - 'release/*'
    
jobs:
  ci-test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit